<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreshMind | AI Kitchen Tracking</title>
    <meta name="theme-color" content="#0A0F1C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="FreshMind helps people track food expiry, get AI recipe suggestions, and cut waste with a polished, startup-grade experience."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/freshmind-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/freshmind-icon-192.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0A0F1C",
              surface: "#111827",
              card: "#1A2234",
              primary: "#10B981",
              accent: "#F59E0B",
              danger: "#EF4444",
              muted: "#9CA3AF"
            },
            fontFamily: {
              display: ["Syne", "sans-serif"],
              body: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"]
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(16,185,129,0.18), 0 24px 80px rgba(16,185,129,0.18)",
              soft: "0 20px 60px rgba(5, 10, 20, 0.35)"
            },
            backgroundImage: {
              grain:
                "radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 28%), radial-gradient(circle at bottom right, rgba(245,158,11,0.12), transparent 28%)"
            }
          }
        }
      };
    </script>
    <style>
      body {
        margin: 0;
        background: #0a0f1c;
        color: #f9fafb;
        font-family: "Outfit", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      ::selection {
        background: rgba(16, 185, 129, 0.35);
        color: #f9fafb;
      }

      * {
        box-sizing: border-box;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.25);
        border-radius: 999px;
      }
    </style>
  </head>
  <body class="bg-ink text-slate-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
